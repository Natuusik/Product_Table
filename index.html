<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Таблица с умной памятью</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="globalPercent">Процент (%):</label>
        <input type="number" id="globalPercent" value="10" min="0">
        <button id="addBtn">Добавить строку</button>
        <button id="clearBtn" class="btn-danger-clear">❌ Сбросить количество</button>

        <div class="backup-controls">
            <button id="exportBtn" class="btn-success">💾 Скачать бэкап</button>
            <button id="importBtn" class="btn-secondary">📂 Загрузить бэкап</button>
            <input type="file" id="fileInput" accept=".json">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nimetus (Наименование)</th>
                <th>Hind (Цена за шт.)</th>
                <th>Kogus (Штук)</th>
                <th>Summa (Сумма)</th>
                <th>Kokku% (Итого с %)</th>
                <th style="width: 50px;"></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Строки создаются через JS -->
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align: right;">KOKKU (ИТОГО):</td>
                <td id="grandSumma">0</td>
                <td id="grandKokku">0</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
