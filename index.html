<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица: Цена, Штуки, Процент</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f7fb;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .backup-controls {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        label {
            font-weight: 600;
            font-size: 14px;
        }
        input[type="number"] {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 6px 12px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background-color: #005a9e;
        }
        button.btn-secondary {
            background-color: #2b88d8;
        }
        button.btn-success {
            background-color: #107c41;
        }
        button.btn-success:hover {
            background-color: #0b5930;
        }
        button.delete-btn {
            background-color: #e81123;
            padding: 4px 8px;
            font-size: 12px;
        }
        button.delete-btn:hover {
            background-color: #b8101c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f3f2f1;
            font-weight: 600;
        }
        td input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 4px;
            font-size: 14px;
        }
        td input:focus {
            outline: 2px solid #0078d4;
            background: #fff;
        }
        .readonly-cell {
            background-color: #faf9f8;
            font-weight: 600;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="globalPercent">Процент (%):</label>
        <input type="number" id="globalPercent" value="10" min="0" oninput="calculateTable(); saveToLocalStorage();">
        <button onclick="addRow()">Добавить строку</button>

        <div class="backup-controls">
            <button class="btn-success" onclick="exportToFile()">💾 Скачать бэкап</button>
            <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">📂 Загрузить бэкап</button>
            <input type="file" id="fileInput" accept=".json" onchange="importFromFile(this)">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nimetus (Наименование)</th>
                <th>Hind (Цена за шт.)</th>
                <th>Kogus (Штук)</th>
                <th>Summa (Сумма)</th>
                <th>Kokku% (Итого с %)</th>
                <th style="width: 50px;"></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Строки загружаются автоматически -->
        </tbody>
    </table>
</div>

<script>
    window.onload = function() {
        loadFromLocalStorage();
    };

    // Главная функция расчетов
    function calculateTable() {
        const percent = parseFloat(document.getElementById('globalPercent').value) || 0;
        const rows = document.querySelectorAll('#tableBody tr');

        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const price = parseFloat(inputs[1].value) || 0; // Цена
            const quantity = parseFloat(inputs[2].value) || 0; // Количество (штуки)
            
            // 1. Считаем промежуточную сумму (Цена * Количество)
            const sum = price * quantity;
            
            // 2. Считаем итоговую сумму с процентом
            const totalWithPercent = sum + (sum * percent / 100);
            
            // Выводим результаты в ячейки таблицы
            row.cells[3].textContent = Number(sum.toFixed(2));
            row.cells[4].textContent = Number(totalWithPercent.toFixed(2));
        });
    }

    // Добавление новой строки
    function addRow(name = "", price = "0", quantity = "1") {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td><input type="text" value="${name}" oninput="saveToLocalStorage()"></td>
            <td><input type="number" value="${price}" oninput="calculateTable(); saveToLocalStorage();"></td>
            <td><input type="number" value="${quantity}" min="0" oninput="calculateTable(); saveToLocalStorage();"></td>
            <td class="readonly-cell">0</td>
            <td class="readonly-cell">0</td>
            <td><button class="delete-btn" onclick="deleteRow(this)">✕</button></td>
        `;
        
        tbody.appendChild(tr);
        calculateTable();
        saveToLocalStorage();
    }

    function deleteRow(button) {
        const row = button.closest('tr');
        row.remove();
        calculateTable();
        saveToLocalStorage();
    }

    function collectCurrentData() {
        const percent = document.getElementById('globalPercent').value;
        const rows = document.querySelectorAll('#tableBody tr');
        const tableData = [];

        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            tableData.push({
                name: inputs[0].value,
                price: inputs[1].value,
                quantity: inputs[2].value
            });
        });

        return {
            percent: percent,
            rows: tableData
        };
    }

    function renderData(data) {
        if (!data) return;
        
        if (data.percent !== undefined) {
            document.getElementById('globalPercent').value = data.percent;
        }

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; 

        if (data.rows && data.rows.length > 0) {
            data.rows.forEach(item => {
                addRow(item.name, item.price, item.quantity);
            });
        }
    }

    // --- АВТОСОХРАНЕНИЕ ---
    function saveToLocalStorage() {
        const data = collectCurrentData();
        localStorage.setItem('excelTableAdvancedBackup', JSON.stringify(data));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('excelTableAdvancedBackup');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                renderData(data);
                return;
            } catch(e) { console.error("Ошибка автозагрузки", e); }
        }
        
        // Стартовый шаблон при первом запуске
        addRow("Põlv100", "100", "2");
        addRow("Põlv500", "50", "5");
    }

    // --- СКАЧАТЬ ФАЙЛ (БЭКАП) ---
    function exportToFile() {
        const data = collectCurrentData();
        const jsonString = JSON.stringify(data, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const date = new Date().toISOString().slice(0, 10);
        
        const link = document.createElement("a");
        link.href = url;
        link.download = `table_v2_backup_${date}.json`;
        document.body.appendChild(link);
        link.click();
        
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // --- ЗАГРУЗИТЬ ФАЙЛ (БЭКАП) ---
    function importFromFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data && data.rows) {
                    renderData(data);
                    saveToLocalStorage();
                    alert("Данные успешно восстановлены!");
                } else {
                    alert("Ошибка: Неверная структура файла.");
                }
            } catch (err) {
                alert("Ошибка чтения файла.");
            }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
